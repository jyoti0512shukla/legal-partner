x-logging: &default-logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "10"

services:
  postgres:
    image: pgvector/pgvector:pg16
    logging: *default-logging
    environment:
      POSTGRES_DB: legalpartner
      POSTGRES_USER: legalpartner
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localdev123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legalpartner"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    logging: *default-logging
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 15
    deploy:
      resources:
        reservations:
          memory: 4G
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        OLLAMA_HOST=http://ollama:11434 ollama pull all-minilm
    restart: "no"

  backend:
    image: ${IMAGE_REGISTRY:-ghcr.io/jyoti0512shukla}/legal-partner-backend:${IMAGE_TAG:-latest}
    logging: *default-logging
    ports:
      - "8080:8080"
    environment:
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/legalpartner
      SPRING_DATASOURCE_USERNAME: legalpartner
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-localdev123}
      # Flyway — production-safe defaults
      FLYWAY_CLEAN_ON_VALIDATION_ERROR: "false"
      FLYWAY_CLEAN_DISABLED: "true"
      # Security
      JASYPT_ENCRYPTOR_PASSWORD: ${ENCRYPTION_KEY:-change-in-prod}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-256-bits-required-for-hs256}
      # LLM — Ollama (embeddings)
      LEGALPARTNER_OLLAMA_BASE_URL: http://ollama:11434
      LEGALPARTNER_OLLAMA_MODEL: ${LEGALPARTNER_OLLAMA_MODEL:-all-minilm}
      # LLM — Chat provider
      LEGALPARTNER_CHAT_PROVIDER: ${LEGALPARTNER_CHAT_PROVIDER:-vllm}
      LEGALPARTNER_CHAT_API_URL: ${LEGALPARTNER_CHAT_API_URL:-}
      LEGALPARTNER_CHAT_API_MODEL: ${LEGALPARTNER_CHAT_API_MODEL:-}
      LEGALPARTNER_GEMINI_API_KEY: ${LEGALPARTNER_GEMINI_API_KEY:-}
      LEGALPARTNER_GEMINI_MODEL: ${LEGALPARTNER_GEMINI_MODEL:-gemini-2.5-flash}
      # URLs
      LEGALPARTNER_CLOUD_FRONTEND_URL: ${LEGALPARTNER_CLOUD_FRONTEND_URL:-http://*:80}
      LEGALPARTNER_CLOUD_BACKEND_URL: ${LEGALPARTNER_CLOUD_BACKEND_URL:-http://localhost:8080}
      LEGALPARTNER_APP_URL: ${LEGALPARTNER_APP_URL:-http://localhost}
      # Document editor
      LEGALPARTNER_ONLYOFFICE_URL: ${LEGALPARTNER_ONLYOFFICE_URL:-}
      LEGALPARTNER_ONLYOFFICE_BACKEND_URL: http://backend:8080
      LEGALPARTNER_STORAGE_PATH: /data/documents
      # Organization
      LEGALPARTNER_ORGANIZATION_NAME: ${LEGALPARTNER_ORGANIZATION_NAME:-}
      # Email / SMTP
      LEGALPARTNER_MAIL_ENABLED: ${LEGALPARTNER_MAIL_ENABLED:-false}
      LEGALPARTNER_MAIL_FROM: ${LEGALPARTNER_MAIL_FROM:-noreply@legalpartner.local}
      SMTP_HOST: ${SMTP_HOST:-smtp.resend.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_ENABLE: ${SMTP_SSL_ENABLE:-true}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: ${SMTP_STARTTLS_ENABLE:-false}
      # Cloud storage integrations
      LEGALPARTNER_GOOGLE_DRIVE_ENABLED: ${LEGALPARTNER_GOOGLE_DRIVE_ENABLED:-false}
      LEGALPARTNER_GOOGLE_DRIVE_CLIENT_ID: ${LEGALPARTNER_GOOGLE_DRIVE_CLIENT_ID:-}
      LEGALPARTNER_GOOGLE_DRIVE_CLIENT_SECRET: ${LEGALPARTNER_GOOGLE_DRIVE_CLIENT_SECRET:-}
      LEGALPARTNER_ONEDRIVE_ENABLED: ${LEGALPARTNER_ONEDRIVE_ENABLED:-false}
      LEGALPARTNER_ONEDRIVE_CLIENT_ID: ${LEGALPARTNER_ONEDRIVE_CLIENT_ID:-}
      LEGALPARTNER_ONEDRIVE_CLIENT_SECRET: ${LEGALPARTNER_ONEDRIVE_CLIENT_SECRET:-}
      LEGALPARTNER_DROPBOX_ENABLED: ${LEGALPARTNER_DROPBOX_ENABLED:-false}
      LEGALPARTNER_DROPBOX_APP_KEY: ${LEGALPARTNER_DROPBOX_APP_KEY:-}
      LEGALPARTNER_DROPBOX_APP_SECRET: ${LEGALPARTNER_DROPBOX_APP_SECRET:-}
      # E-signature
      LEGALPARTNER_DOCUSIGN_ENABLED: ${LEGALPARTNER_DOCUSIGN_ENABLED:-false}
      LEGALPARTNER_DOCUSIGN_CLIENT_ID: ${LEGALPARTNER_DOCUSIGN_CLIENT_ID:-}
      LEGALPARTNER_DOCUSIGN_CLIENT_SECRET: ${LEGALPARTNER_DOCUSIGN_CLIENT_SECRET:-}
      LEGALPARTNER_DOCUSIGN_ENV: ${LEGALPARTNER_DOCUSIGN_ENV:-demo}
      # Collaboration integrations
      LEGALPARTNER_SLACK_ENABLED: ${LEGALPARTNER_SLACK_ENABLED:-false}
      LEGALPARTNER_TEAMS_ENABLED: ${LEGALPARTNER_TEAMS_ENABLED:-false}
      # DMS integrations
      LEGALPARTNER_NETDOCUMENTS_ENABLED: ${LEGALPARTNER_NETDOCUMENTS_ENABLED:-false}
      LEGALPARTNER_NETDOCUMENTS_CLIENT_ID: ${LEGALPARTNER_NETDOCUMENTS_CLIENT_ID:-}
      LEGALPARTNER_NETDOCUMENTS_CLIENT_SECRET: ${LEGALPARTNER_NETDOCUMENTS_CLIENT_SECRET:-}
      LEGALPARTNER_IMANAGE_ENABLED: ${LEGALPARTNER_IMANAGE_ENABLED:-false}
      LEGALPARTNER_IMANAGE_CLIENT_ID: ${LEGALPARTNER_IMANAGE_CLIENT_ID:-}
      LEGALPARTNER_IMANAGE_CLIENT_SECRET: ${LEGALPARTNER_IMANAGE_CLIENT_SECRET:-}
      LEGALPARTNER_IMANAGE_SERVER: ${LEGALPARTNER_IMANAGE_SERVER:-}
    volumes:
      - document_storage:/data/documents
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  frontend:
    image: ${IMAGE_REGISTRY:-ghcr.io/jyoti0512shukla}/legal-partner-frontend:${IMAGE_TAG:-latest}
    logging: *default-logging
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # Optional: enable with COMPOSE_PROFILES=onlyoffice in .env
  onlyoffice:
    image: onlyoffice/documentserver:latest
    profiles: ["onlyoffice"]
    logging: *default-logging
    ports:
      - "8443:80"
    environment:
      JWT_ENABLED: "false"
      ALLOW_PRIVATE_IP_ADDRESS: "true"
      ALLOW_META_IP_ADDRESS: "true"
    volumes:
      - onlyoffice_data:/var/lib/onlyoffice
    restart: unless-stopped

volumes:
  pgdata:
  ollama_models:
  document_storage:
  onlyoffice_data:
