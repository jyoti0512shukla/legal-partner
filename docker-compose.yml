x-logging: &default-logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "10"

services:
  postgres:
    image: pgvector/pgvector:pg16
    logging: *default-logging
    environment:
      POSTGRES_DB: legalpartner
      POSTGRES_USER: legalpartner
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localdev123}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legalpartner"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    logging: *default-logging
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 15
    deploy:
      resources:
        reservations:
          memory: 4G
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        OLLAMA_HOST=http://ollama:11434 ollama pull all-minilm
        OLLAMA_HOST=http://ollama:11434 ollama pull tinyllama
    restart: "no"

  backend:
    logging: *default-logging
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/legalpartner
      SPRING_DATASOURCE_USERNAME: legalpartner
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-localdev123}
      LEGALPARTNER_OLLAMA_BASE_URL: http://ollama:11434
      LEGALPARTNER_OLLAMA_MODEL: ${LEGALPARTNER_OLLAMA_MODEL:-tinyllama}
      # Optional: Colab/ngrok URL for chat model (e.g. https://xxx.ngrok-free.dev)
      LEGALPARTNER_CHAT_API_URL: ${LEGALPARTNER_CHAT_API_URL:-}
      LEGALPARTNER_CHAT_API_MODEL: ${LEGALPARTNER_CHAT_API_MODEL:-mistralai/Mistral-7B-Instruct-v0.2}
      JASYPT_ENCRYPTOR_PASSWORD: ${ENCRYPTION_KEY:-demo-encryption-key-change-in-prod}
      LEGALPARTNER_CLOUD_FRONTEND_URL: ${LEGALPARTNER_CLOUD_FRONTEND_URL:-http://*:3000}
      # Drop and rebuild DB automatically when a migration script is edited during development
      FLYWAY_CLEAN_ON_VALIDATION_ERROR: "true"
      FLYWAY_CLEAN_DISABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
  ollama_models:
