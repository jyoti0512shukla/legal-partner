name: Build and Push Docker Images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: tags
        run: |
          PREFIX="${{ env.IMAGE_PREFIX }}"
          DATE=$(date -u +%Y.%m.%d)

          # Count today's releases by checking existing tags in ghcr.io
          EXISTING=$(docker manifest inspect "${PREFIX}/legal-partner-backend:v${DATE}-1" > /dev/null 2>&1 && echo "exists" || echo "")
          RELEASE=1
          if [[ -n "$EXISTING" ]]; then
            # Find the highest release number for today
            for i in $(seq 1 50); do
              docker manifest inspect "${PREFIX}/legal-partner-backend:v${DATE}-${i}" > /dev/null 2>&1 && RELEASE=$((i + 1)) || break
            done
          fi

          VERSION="v${DATE}-${RELEASE}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "backend=${PREFIX}/legal-partner-backend:latest,${PREFIX}/legal-partner-backend:${VERSION}" >> "$GITHUB_OUTPUT"
          echo "frontend=${PREFIX}/legal-partner-frontend:latest,${PREFIX}/legal-partner-frontend:${VERSION}" >> "$GITHUB_OUTPUT"
          echo "### 🐳 Image version: \`${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.tags.outputs.backend }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.tags.outputs.frontend }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
