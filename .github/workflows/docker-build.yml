name: Test, Build and Push Docker Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('backend/build.gradle.kts') }}

      - name: Run tests
        working-directory: backend
        run: ./gradlew test

      - name: Test summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Tests
          path: backend/build/test-results/test/*.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

  build-and-push:
    needs: test
    if: github.event_name == 'push'  # Only build images on push to main, not PRs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: tags
        run: |
          PREFIX="${{ env.IMAGE_PREFIX }}"
          DATE=$(date -u +%Y.%m.%d)

          EXISTING=$(docker manifest inspect "${PREFIX}/legal-partner-backend:v${DATE}-1" > /dev/null 2>&1 && echo "exists" || echo "")
          RELEASE=1
          if [[ -n "$EXISTING" ]]; then
            for i in $(seq 1 50); do
              docker manifest inspect "${PREFIX}/legal-partner-backend:v${DATE}-${i}" > /dev/null 2>&1 && RELEASE=$((i + 1)) || break
            done
          fi

          VERSION="v${DATE}-${RELEASE}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "backend=${PREFIX}/legal-partner-backend:latest,${PREFIX}/legal-partner-backend:${VERSION}" >> "$GITHUB_OUTPUT"
          echo "frontend=${PREFIX}/legal-partner-frontend:latest,${PREFIX}/legal-partner-frontend:${VERSION}" >> "$GITHUB_OUTPUT"
          echo "### 🐳 Image version: \`${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.tags.outputs.backend }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.tags.outputs.frontend }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
