name: Build and Push Docker Images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: tags
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          DATE=$(date -u +%Y%m%d-%H%M%S)
          PREFIX="${{ env.IMAGE_PREFIX }}"
          echo "backend=${PREFIX}/legal-partner-backend:latest,${PREFIX}/legal-partner-backend:${SHA},${PREFIX}/legal-partner-backend:${DATE}" >> "$GITHUB_OUTPUT"
          echo "frontend=${PREFIX}/legal-partner-frontend:latest,${PREFIX}/legal-partner-frontend:${SHA},${PREFIX}/legal-partner-frontend:${DATE}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.tags.outputs.backend }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.tags.outputs.frontend }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
