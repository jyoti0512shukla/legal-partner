spring:
  application:
    name: legal-partner-backend
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/legalpartner}
    username: ${SPRING_DATASOURCE_USERNAME:legalpartner}
    password: ${SPRING_DATASOURCE_PASSWORD:localdev123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:demo-encryption-key-change-in-prod}

langchain4j:
  ollama:
    chat-model:
      base-url: ${LEGALPARTNER_OLLAMA_BASE_URL:http://localhost:11434}
      model-name: tinyllama
      timeout: PT120S
    embedding-model:
      base-url: ${LEGALPARTNER_OLLAMA_BASE_URL:http://localhost:11434}
      model-name: all-minilm
      timeout: PT60S

legalpartner:
  # Optional: When set, use OpenAI-compatible API (e.g. Colab/ngrok) for chat instead of Ollama
  # Example: https://circulable-chere-lucidly.ngrok-free.dev
  chat-api-url: ${LEGALPARTNER_CHAT_API_URL:}
  chat-api-model: ${LEGALPARTNER_CHAT_API_MODEL:mistralai/Mistral-7B-Instruct-v0.2}
  rag:
    candidate-count: 15
    top-k: 5
    vector-weight: 0.7
    keyword-weight: 0.2
    recency-weight: 0.1
    ollama-timeout-seconds: 120
  chunking:
    target-size: 80
    max-size: 100
    min-size: 20
    overlap: 15
