spring:
  application:
    name: legal-partner-backend
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/legalpartner}
    username: ${SPRING_DATASOURCE_USERNAME:legalpartner}
    password: ${SPRING_DATASOURCE_PASSWORD:localdev123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Dev: drop and rebuild DB when a migration script changes (checksum mismatch).
    # Safe because seeder repopulates data. Set clean-disabled=true in prod.
    clean-on-validation-error: ${FLYWAY_CLEAN_ON_VALIDATION_ERROR:false}
    clean-disabled: ${FLYWAY_CLEAN_DISABLED:true}
  # SMTP relay — only active when legalpartner.mail.enabled=true
  # Supported relays: Gmail (smtp.gmail.com:587), SendGrid (smtp.sendgrid.net:587),
  #                   AWS SES (email-smtp.<region>.amazonaws.com:587)
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    mail:
      enabled: false   # mail is optional; don't let missing SMTP creds fail the health check

jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:${ENCRYPTION_KEY:}}

langchain4j:
  ollama:
    chat-model:
      base-url: ${LEGALPARTNER_OLLAMA_BASE_URL:http://localhost:11434}
      model-name: ${LEGALPARTNER_OLLAMA_MODEL:mistral}
      timeout: PT180S
      num-ctx: 8192        # Mistral full context window (default was 4096)
      num-keep: 512        # Pin system prompt in KV cache across requests
      num-predict: 1024    # Max tokens to generate per response
    embedding-model:
      base-url: ${LEGALPARTNER_OLLAMA_BASE_URL:http://localhost:11434}
      model-name: all-minilm
      timeout: PT60S

legalpartner:
  legal-system: ${LEGALPARTNER_LEGAL_SYSTEM:USA}   # USA | INDIA
  defaults:
    jurisdiction: ${LEGALPARTNER_DEFAULT_JURISDICTION:United States (Delaware)}
  storage:
    path: ${LEGALPARTNER_STORAGE_PATH:/data/documents}
  onlyoffice:
    url: ${LEGALPARTNER_ONLYOFFICE_URL:http://localhost:8443}
    backend-url: ${LEGALPARTNER_ONLYOFFICE_BACKEND_URL:http://backend:8080}
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-min-256-bits-required-for-hs256}
    issuer: legal-partner
    expiration-minutes: 60
    expiration-minutes-remember-me: 10080  # 7 days
  password:
    min-length: 12
    max-length: 128
    require-uppercase: true
    require-lowercase: true
    require-digit: true
    require-special: true
    block-common: true
    expiry-days: 90
    history-count: 5
  lockout:
    max-attempts: 5
    lock-duration-minutes: 15
  # LLM provider: "vllm" (default) or "gemini"
  chat-provider: ${LEGALPARTNER_CHAT_PROVIDER:vllm}
  # vLLM / OpenAI-compatible (when chat-provider=vllm)
  chat-api-url: ${LEGALPARTNER_CHAT_API_URL:}
  chat-api-model: ${LEGALPARTNER_CHAT_API_MODEL:mistralai/Mistral-7B-Instruct-v0.2}
  # Google Gemini (when chat-provider=gemini)
  gemini-api-key: ${LEGALPARTNER_GEMINI_API_KEY:}
  gemini-model: ${LEGALPARTNER_GEMINI_MODEL:gemini-2.5-flash}
  # Optional: When set, use OpenAI-compatible embedding API (e.g. Colab Flask) instead of Ollama. For low-resource dev.
  embedding-api-url: ${LEGALPARTNER_EMBEDDING_API_URL:}
  embedding-api-model: ${LEGALPARTNER_EMBEDDING_API_MODEL:all-MiniLM-L6-v2}
  integrations:
    frontend-url: ${LEGALPARTNER_CLOUD_FRONTEND_URL:http://localhost:5173}
    backend-url: ${LEGALPARTNER_CLOUD_BACKEND_URL:http://localhost:8080}
    docusign:
      enabled: ${LEGALPARTNER_DOCUSIGN_ENABLED:false}
      client-id: ${LEGALPARTNER_DOCUSIGN_CLIENT_ID:}
      client-secret: ${LEGALPARTNER_DOCUSIGN_CLIENT_SECRET:}
      environment: ${LEGALPARTNER_DOCUSIGN_ENV:demo}
    slack:
      enabled: ${LEGALPARTNER_SLACK_ENABLED:false}
    net-documents:
      enabled: ${LEGALPARTNER_NETDOCUMENTS_ENABLED:false}
      client-id: ${LEGALPARTNER_NETDOCUMENTS_CLIENT_ID:}
      client-secret: ${LEGALPARTNER_NETDOCUMENTS_CLIENT_SECRET:}
    imanage:
      enabled: ${LEGALPARTNER_IMANAGE_ENABLED:false}
      client-id: ${LEGALPARTNER_IMANAGE_CLIENT_ID:}
      client-secret: ${LEGALPARTNER_IMANAGE_CLIENT_SECRET:}
      server: ${LEGALPARTNER_IMANAGE_SERVER:}
    microsoft-teams:
      enabled: ${LEGALPARTNER_TEAMS_ENABLED:false}
  cloud:
    frontend-url: ${LEGALPARTNER_CLOUD_FRONTEND_URL:http://localhost:5173}
    backend-url: ${LEGALPARTNER_CLOUD_BACKEND_URL:http://localhost:8080}
    google:
      enabled: ${LEGALPARTNER_GOOGLE_DRIVE_ENABLED:false}
      client-id: ${LEGALPARTNER_GOOGLE_DRIVE_CLIENT_ID:}
      client-secret: ${LEGALPARTNER_GOOGLE_DRIVE_CLIENT_SECRET:}
    microsoft:
      enabled: ${LEGALPARTNER_ONEDRIVE_ENABLED:false}
      client-id: ${LEGALPARTNER_ONEDRIVE_CLIENT_ID:}
      client-secret: ${LEGALPARTNER_ONEDRIVE_CLIENT_SECRET:}
      tenant: ${LEGALPARTNER_ONEDRIVE_TENANT:common}
    dropbox:
      enabled: ${LEGALPARTNER_DROPBOX_ENABLED:false}
      app-key: ${LEGALPARTNER_DROPBOX_APP_KEY:}
      app-secret: ${LEGALPARTNER_DROPBOX_APP_SECRET:}
  rate-limit:
    ai-requests-per-minute: ${LEGALPARTNER_RATE_LIMIT_AI:15}          # per authenticated user per minute
    login-per-minute: ${LEGALPARTNER_RATE_LIMIT_LOGIN:5}              # per IP per minute
    register-per-minute: ${LEGALPARTNER_RATE_LIMIT_REGISTER:3}        # per IP per minute
    reset-per-hour: ${LEGALPARTNER_RATE_LIMIT_RESET:3}                # per IP per hour
  draft:
    retrieval:
      candidate-count: 30
      top-k: 12
      max-chunks-per-doc: 3
      context-max-chars: 8000
  # ── LLM parameters (vLLM path) ────────────────────────────────────────────
  llm:
    timeout-seconds: 600
    stop-sequences: "[/INST],[INST],__PROCESSED_REQUEST__,__INSTRUCTION__,__RESPONSE__,__FOLLOW_UP_QUESTIONS__,__FORBIDDEN_ACTIONS,__CONFIRMATION_OF_UNDERSTANDING__,__BEGIN_PREMIUM_INSTRUCTIONS__,\\nCFR § ,\\nFAR § "
    chat:
      max-tokens: 4000
      frequency-penalty: 0.1
    short:
      max-tokens: 2000
      temperature: 0.3
      frequency-penalty: 0.1
    json:
      max-tokens: 2000
      temperature: 0.1
      frequency-penalty: 0.3
  # ── Text truncation caps ─────────────────────────────────────────────────
  text:
    section-cap-chars: 4000               # max chars when extracting a single section
    extraction-cap-chars: 3000            # cap for extraction prompts (preamble, per-section)
  extraction:
    full-text-cap-chars: 12000           # window size for vLLM discovery pass (Gemini uses full doc)
    overlap-chars: 2000                  # overlap between chunked windows
    refine-context-cap-chars: 3000        # cap for clause-refine surrounding context
    contextual-summary-cap-chars: 4000    # cap for contextual retrieval document summaries
  # ── Full-text retriever ──────────────────────────────────────────────────
  fulltext:
    short-doc-threshold: 40000
    max-chars: 40000
  rag:
    candidate-count: 20
    top-k: 5
    vector-weight: 0.7
    keyword-weight: 0.2
    doctype-weight: 0.1
    context-max-chars: 6000
    compare-context-chars: 3000
    retrieve-candidates: 200
    ollama-timeout-seconds: 180
  # ── Workflow context retrieval ───────────────────────────────────────────
  workflow:
    candidate-count: 20
    max-context-chars: 4000
  context:
    model-window-tokens: 8192          # must match num-ctx above
    answer-headroom-tokens: 512        # reserve for model output
    system-prompt-tokens: 250          # estimated fixed cost of system prompt

  conversation:
    max-history-turns: 10              # hard cap on stored turns (memory safety)
    summarize-threshold-tokens: 800    # trigger rolling summarization when history > 800 tokens
    keep-verbatim-turns: 2             # verbatim turns to keep after summarization
    semantic-relevance-threshold: 0.35 # cosine similarity floor for including a past turn
  chunking:
    target-size: 80
    max-size: 100
    min-size: 20
    overlap: 15
  workflows:
    enabled: true
  agent:
    max-concurrent: ${LEGALPARTNER_AGENT_MAX_CONCURRENT:3}
  mail:
    enabled: ${LEGALPARTNER_MAIL_ENABLED:false}
    from: ${LEGALPARTNER_MAIL_FROM:noreply@legalpartner.local}
    app-url: ${LEGALPARTNER_APP_URL:http://localhost:5173}

