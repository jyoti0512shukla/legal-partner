# Structured risk questions per clause type.
# Source: CUAD 41 categories + ACC/ABA contract review checklists.
#
# Each question:
#   id        — unique identifier
#   question  — YES/NO question for the LLM
#   risk_if_no  — risk level if answer is NO (HIGH/MEDIUM/LOW/INFO)
#   risk_if_yes — risk level if answer is YES
#   category  — display grouping
#   applies_to — contract types this question applies to (empty = all)
#   weight    — importance (1-10)

# ── Configurable prompts (edit here, restart server — no code change needed) ──

prompts:
  system: |
    You are a senior legal risk analyst.
    For each question, carefully search the entire clause text for relevant provisions.
    First FIND and QUOTE the relevant text, then determine if the answer is YES or NO.
    A provision counts as present even if worded differently from the question — look for the CONCEPT, not exact words.
    Output ONLY valid JSON — no markdown, no commentary.

  user_template: |
    Clause type: {{clauseType}}

    Clause text:
    {{clauseText}}

    Questions:
    {{questions}}

    IMPORTANT: Read the clause text CAREFULLY before answering.
    Many provisions use different wording — for example, a "liability cap" might be worded as
    "aggregate liability shall not exceed" or "total liability is limited to".
    Answer YES if the CONCEPT is addressed, even if different words are used.

    Output ONLY valid JSON in this exact format:
    {"answers": [
      {"id": "question_id", "answer": "YES", "quote": "exact text from clause that addresses this..."},
      {"id": "question_id", "answer": "NO", "quote": ""}
    ]}

    Rules:
    - answer must be exactly "YES" or "NO"
    - quote must be copied verbatim from the clause text
    - answer YES if the concept is addressed, even with different wording
    - answer NO only if you searched the entire text and the concept is truly absent
    - if you see placeholder text like [Liability Cap Months] or [Notice Days] or [as agreed by the Parties], answer YES — the provision EXISTS but the specific value needs to be filled in. This is normal for draft contracts.

clause_questions:

  LIABILITY:
    - id: liability_cap_exists
      question: "Is there a monetary cap on the aggregate liability of either party?"
      risk_if_no: HIGH
      risk_if_yes: LOW
      category: Protection
      applies_to: []
      weight: 10

    - id: liability_cap_mutual
      question: "Does the liability cap apply equally to both parties (mutual cap)?"
      risk_if_no: HIGH
      risk_if_yes: LOW
      category: Protection
      applies_to: []
      weight: 9

    - id: liability_consequential_exclusion
      question: "Are consequential, indirect, or special damages explicitly excluded?"
      risk_if_no: HIGH
      risk_if_yes: LOW
      category: Protection
      applies_to: []
      weight: 9

    - id: liability_carveouts
      question: "Are there carve-outs from the liability cap for IP infringement, confidentiality breach, or gross negligence?"
      risk_if_no: MEDIUM
      risk_if_yes: LOW
      category: Protection
      applies_to: []
      weight: 7

    - id: liability_cap_reasonable
      question: "Is the liability cap tied to a reasonable measure such as fees paid in the preceding 12 months?"
      risk_if_no: MEDIUM
      risk_if_yes: LOW
      category: Protection
      applies_to: []
      weight: 7

    - id: liability_insurance_required
      question: "Does the agreement require either party to maintain professional liability or general liability insurance?"
      risk_if_no: LOW
      risk_if_yes: LOW
      category: Protection
      applies_to: [MSA, SAAS]
      weight: 4

    - id: liability_sole_remedy
      question: "Is there a sole and exclusive remedy clause limiting available remedies?"
      risk_if_no: INFO
      risk_if_yes: MEDIUM
      category: Remedies
      applies_to: []
      weight: 5

    - id: liability_fraud_exclusion
      question: "Does the agreement clarify that the liability limitation does not apply to fraud, willful misconduct, or death/personal injury?"
