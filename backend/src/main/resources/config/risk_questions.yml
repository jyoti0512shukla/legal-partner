      weight: 5

    - id: sla_termination_chronic_breach
      question: "Can the customer terminate for chronic or repeated SLA failures?"
      risk_if_no: MEDIUM
      risk_if_yes: LOW
      category: Exit Rights
      applies_to: [SAAS]
      weight: 7

  GENERAL_PROVISIONS:
    - id: gen_entire_agreement
      question: "Does the agreement contain an entire agreement (integration) clause?"
      risk_if_no: MEDIUM
      risk_if_yes: LOW
      category: Completeness
      applies_to: []
      weight: 8

    - id: gen_amendment_procedure
      question: "Is there a procedure for amendments requiring written agreement of both parties?"
      risk_if_no: MEDIUM
      risk_if_yes: LOW
      category: Change Control
      applies_to: []
      weight: 7

    - id: gen_severability
      question: "Is there a severability clause providing that invalid provisions do not void the entire agreement?"
      risk_if_no: LOW
      risk_if_yes: LOW
      category: Resilience
      applies_to: []
      weight: 6

    - id: gen_waiver
      question: "Does the agreement state that a waiver of one breach does not waive future breaches?"
      risk_if_no: LOW
      risk_if_yes: LOW
      category: Enforcement
      applies_to: []
      weight: 6

    - id: gen_assignment_restriction
      question: "Are there restrictions on assignment of the agreement without the other party's consent?"
      risk_if_no: HIGH
      risk_if_yes: LOW
      category: Protection
      applies_to: []
      weight: 8

    - id: gen_notices_procedure
      question: "Is there a formal notices provision specifying addresses and delivery methods?"
      risk_if_no: MEDIUM
      risk_if_yes: LOW
      category: Process
      applies_to: []
      weight: 6

    - id: gen_counterparts
      question: "Does the agreement allow execution in counterparts and electronic signatures?"
      risk_if_no: LOW
      risk_if_yes: LOW
      category: Execution
      applies_to: []
      weight: 4

    - id: gen_independent_contractor
      question: "Is the relationship between the parties defined (e.g., independent contractor, not employment or partnership)?"
      risk_if_no: MEDIUM
      risk_if_yes: LOW
      category: Relationship
      applies_to: [MSA, SAAS]
      weight: 6

    - id: gen_no_third_party_beneficiary
      question: "Is there a clause stating that the agreement does not confer rights on third parties?"
      risk_if_no: LOW
      risk_if_yes: LOW
      category: Scope
      applies_to: []
      weight: 5

    - id: gen_order_of_precedence
      question: "Is there a clause establishing the order of precedence between the main agreement and any schedules, exhibits, or SOWs?"
      risk_if_no: MEDIUM
      risk_if_yes: LOW
      category: Clarity
      applies_to: [MSA, SAAS]
      weight: 6

