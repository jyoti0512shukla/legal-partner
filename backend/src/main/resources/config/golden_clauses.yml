      fees and commercial terms; and (d) any information designated as "Confidential" or "Proprietary" at the time of disclosure,
      or that a reasonable person would understand to be confidential given the nature of the information and the circumstances
      of disclosure.

      Obligations of Confidentiality. The Receiving Party shall: (a) hold all Confidential Information in strict confidence
      using at least the same degree of care it uses to protect its own confidential information, but in no event less than
      reasonable care; (b) not disclose Confidential Information to any third party without the Disclosing Party''s prior written
      consent, except to the Receiving Party''s employees, officers, directors, contractors and professional advisors who have
      a demonstrable need to know for the purposes of this Agreement and who are bound by written confidentiality obligations
      no less protective than those set forth herein; (c) not use Confidential Information for any purpose other than the
      performance of obligations and exercise of rights under this Agreement; and (d) promptly notify the Disclosing Party
      in writing upon discovery of any unauthorized use or disclosure of Confidential Information and cooperate with the
      Disclosing Party in remedying such unauthorized use or disclosure.

      Exceptions. Confidential Information shall not include information that: (a) is or becomes generally available to the
      public through no fault of the Receiving Party; (b) was known to the Receiving Party prior to disclosure by the Disclosing
      Party, as demonstrated by the Receiving Party''s contemporaneous written records; (c) becomes available to the Receiving
      Party on a non-confidential basis from a source other than the Disclosing Party, provided that such source is not bound
      by a confidentiality obligation to the Disclosing Party; (d) is independently developed by the Receiving Party without
      reference to or use of the Disclosing Party''s Confidential Information, as demonstrated by contemporaneous documentation;
      or (e) is required to be disclosed by law, regulation, or court order, provided that the Receiving Party gives the Disclosing
      Party prompt written notice of such requirement (to the extent legally permitted) and reasonable cooperation in any effort
      to obtain protective treatment of such information.

      Return and Destruction. Upon termination or expiration of this Agreement, or upon the Disclosing Party''s written request
      at any time, the Receiving Party shall promptly return or destroy all tangible and electronic materials containing or
      embodying Confidential Information, including all copies, notes, summaries, analyses and derivative materials, and shall
      certify such return or destruction in writing within fifteen (15) days. Notwithstanding the foregoing, the Receiving Party
      may retain one (1) archival copy of Confidential Information solely for legal compliance and audit purposes, subject to
      the continuing confidentiality obligations set forth herein.

      Survival. The obligations of confidentiality set forth in this Section shall survive termination or expiration of this
      Agreement for a period of {{survival_years}} years from the date of disclosure, provided that obligations with respect
      to trade secrets shall continue for so long as such information remains a trade secret under applicable law.

      '
