# Golden Clause Library — curated, templatized legal clauses for deterministic fallback.
#
# Structure: clause_type → entries[] (each with contract_type, jurisdiction, template, etc.)
#
# Placeholders use {{field}} syntax. Fields are resolved from DealSpec using dotted paths:
#   {{partyA.name}}, {{partyB.name}}, {{fees.licenseFee}}, {{license.users}}, etc.
#
# Convenience aliases (resolved by GoldenClauseLibrary before DealSpec lookup):
#   {{licensor}}          → partyA.name (when partyA.role == Licensor) or partyB.name
#   {{licensee}}          → the other party
#   {{license_fee}}       → fees.licenseFee (formatted)
#   {{maintenance_fee}}   → fees.maintenanceFee (formatted)
#   {{users}}             → license.users
#   {{locations}}         → license.locations
#   {{sla_hours}}         → support.slaResponseHours
#   {{support_coverage}}  → support.coverage
#   {{patch_frequency}}   → support.patchFrequency
#   {{jurisdiction}}      → legal.jurisdiction
#   {{court}}             → legal.court
#   {{notice_days}}       → legal.noticeDays
#   {{software_name}}     → "the Software" (default if not specified)
#
# Conditional blocks: {{#if field}}...{{/if}} — block is included only if field is non-null.
# Industry additions: appended as additional paragraph when industry matches.

clauses:
  DEFINITIONS:
  - id: DEF_NDA_CONFIDENTIAL_INFO
    contract_type: nda
    jurisdiction: default
    quality_score: 5
    source: Curated from Fortune 500 mutual NDA precedents
    template: '"Confidential Information" means any and all non-public, confidential or proprietary information disclosed
      by {{disclosing_party}} (the "Disclosing Party") to {{receiving_party}} (the "Receiving Party"), whether disclosed orally,
      in writing, electronically or by inspection of tangible objects, including without limitation: (a) trade secrets, inventions,
      ideas, processes, methods, formulae, source code, object code, algorithms, data, programs, software and software source
      documents; (b) business plans, financial data, customer lists, supplier lists, pricing information, marketing plans
      and strategies; (c) technical specifications, designs, drawings, engineering data, know-how and technical information;
      and (d) any other information designated as "Confidential," "Proprietary" or with a similar legend at the time of disclosure,
      or that a reasonable person would understand to be confidential given the nature of the information and the circumstances
      of disclosure. Confidential Information shall include all notes, analyses, compilations, studies, summaries and other
      materials prepared by the Receiving Party or its Representatives that contain, reflect or are based upon, in whole or
      in part, the Confidential Information furnished by the Disclosing Party.

      '
  - id: DEF_NDA_EXCLUSIONS
    contract_type: nda
    jurisdiction: default
    quality_score: 5
    source: Market-standard NDA exclusion carve-outs
    template: 'Confidential Information shall not include information that: (a) is or becomes generally available to the public
      other than as a result of a disclosure by the Receiving Party or its Representatives in violation of this Agreement;
      (b) was available to the Receiving Party on a non-confidential basis prior to its disclosure by the Disclosing Party,
      as demonstrated by the Receiving Party''s written records; (c) becomes available to the Receiving Party on a non-confidential
      basis from a source other than the Disclosing Party, provided that such source is not bound by a confidentiality agreement
      with, or other obligation of secrecy to, the Disclosing Party with respect to such information; or (d) is independently
      developed by the Receiving Party without reference to or use of the Disclosing Party''s Confidential Information, as
      demonstrated by the Receiving Party''s contemporaneous written records. The burden of proving the applicability of any
      of the foregoing exclusions shall rest with the Receiving Party.

      '
  - id: DEF_MSA_KEY_TERMS
    contract_type: msa
    jurisdiction: default
    quality_score: 5
    source: Curated from SEC-filed master services agreements (Reynolds, Federated, Verizon patterns)
    template: 'As used in this Agreement, the following terms shall have the following meanings: "Affiliate" means, with respect
      to any person, any other person who directly or indirectly, through one or more intermediaries, controls, is controlled
      by, or is under common control with, such person. "Control" means the possession, directly or indirectly, of the power
      to direct or cause the direction of the management and policies of a person, whether through the ownership of voting
      securities, by contract or otherwise. "Deliverables" means all documents, work product, materials, data, reports, and
      other tangible or intangible results of the Services provided by {{service_provider}} under this Agreement and any Statement
      of Work. "Services" means the professional, technical and consulting services to be provided by {{service_provider}}
      to {{client}} as described in this Agreement and each Statement of Work executed hereunder. "Statement of Work" or "SOW"
      means a written document executed by both parties that describes the specific Services to be performed, Deliverables,
      timelines, fees and acceptance criteria for a particular engagement under this Agreement.

      '
  - id: DEF_SAAS_KEY_TERMS
    contract_type: saas
    jurisdiction: default
    quality_score: 5
    source: Curated from SEC-filed SaaS agreements (Coursera, AssetMark, EVEMeta/BragHouse patterns)
    template: 'As used in this Agreement, the following terms shall have the following meanings: "Authorized User" means {{customer}}''s
      employees, consultants, contractors and agents who are authorized by {{customer}} to access and use the Service under
      the rights granted pursuant to this Agreement. "Customer Data" means, other than Aggregated Statistics, all information,
      data and other content, in any form or medium, that is submitted, posted or otherwise transmitted by or on behalf of
      {{customer}} or any Authorized User through the Service. "Documentation" means {{provider}}''s end user documentation
      relating to the Service made available to {{customer}} at the time of execution or as updated from time to time. "Service"
      means {{provider}}''s proprietary cloud-based software-as-a-service platform described in the applicable Order Form,
      including all updates, upgrades and enhancements thereto made generally available by {{provider}} during the Subscription
      Term. "Subscription Term" means the initial term specified in the Order Form and each renewal term thereafter.

      '
  - id: DEF_EMPLOYMENT_KEY_TERMS
    contract_type: employment
    jurisdiction: default
    quality_score: 5
    source: Curated from enterprise employment agreement precedents
    template: 'As used in this Agreement, the following terms shall have the following meanings: "Confidential Information"
      means any and all information, whether written, oral, electronic or visual, relating to the business, operations, finances,
      customers, suppliers, technology, trade secrets, intellectual property, strategies, plans and affairs of {{employer}}
      and its Affiliates that is not generally known or available to the public, including without limitation: technical data,
      know-how, research, product plans, software, developments, inventions, processes, formulas, technology, designs, drawings,
      marketing, finances, business strategies, customer lists, vendor agreements, pricing information and other proprietary
      information. "Invention" means any idea, invention, discovery, improvement, design, technique, process, method, formula,
      algorithm, software program, work of authorship or other intellectual property, whether or not patentable or copyrightable,
      that is conceived, developed, created or reduced to practice by {{employee}}, solely or jointly with others, during
      the term of employment and that: (a) relates to the business of {{employer}} or any of its Affiliates; (b) results from
      any work performed by {{employee}} for {{employer}}; or (c) is developed using {{employer}}''s equipment, supplies,
      facilities or Confidential Information.

      '
  - id: DEF_SUPPLY_KEY_TERMS
    contract_type: supply
    jurisdiction: default
    quality_score: 5
    source: Curated from SEC-filed supply agreements (Pfizer/Upjohn, Reynolds/Pactiv, InMode/Flextronics patterns)
    template: 'As used in this Agreement, the following terms shall have the following meanings: "Products" means the goods
      described in the Purchase Schedule(s) or Exhibit(s) attached hereto, including all applicable specifications, drawings
      and quality requirements referenced therein. "Purchase Order" means a written or electronic order submitted by {{buyer}}
      to {{supplier}} in accordance with this Agreement authorizing the manufacture and supply of specified quantities of
      Products. "Specifications" means the technical specifications, quality standards, packaging requirements and other written
      requirements for the Products as set forth in the applicable Purchase Schedule or as otherwise agreed in writing by
      the parties. "Forecast" means the rolling demand forecast provided by {{buyer}} to {{supplier}} on a monthly basis setting
      forth {{buyer}}''s projected requirements for the Products over the forecast period specified herein. "Non-Conforming
      Product" means any Product that, at the time of delivery, fails to conform in any material respect to the Specifications,
      applicable law, current Good Manufacturing Practices (where applicable) or the warranties set forth in this Agreement.

      '
  - id: DEF_IP_LICENSE_KEY_TERMS
    contract_type: ip_license
    jurisdiction: default
    quality_score: 5
    source: Curated from enterprise IP license agreement precedents
    template: 'As used in this Agreement, the following terms shall have the following meanings: "Licensed IP" means the patents,
      copyrights, trademarks, trade secrets and other intellectual property rights described in the License Schedule attached
      hereto, including all improvements, enhancements and derivative works thereof made by {{licensor}} during the term of
      this Agreement. "License Fee" means the fees payable by {{licensee}} to {{licensor}} for the rights granted under this
      Agreement, as set forth in the License Schedule. "Licensed Products" means the products, services, processes or works
      that are manufactured, sold, distributed, performed, displayed or otherwise exploited by {{licensee}} utilizing or incorporating
      the Licensed IP. "Licensed Territory" means the geographic territory specified in the License Schedule in which {{licensee}}
      is authorized to exercise the rights granted hereunder. "Licensed Field" means the field of use specified in the License
      Schedule to which the license granted hereunder is limited.

      '
  - id: DEF_SOFTWARE_LICENSE_KEY_TERMS
    contract_type: software_license
    jurisdiction: default
    quality_score: 5
    source: Curated from Fortune 500 enterprise software license agreements
    template: 'As used in this Agreement, the following terms shall have the following meanings: "Software" means the computer
      software programs, including all modules, components, application programming interfaces, libraries and related documentation,
      developed, owned or licensed by {{licensor}} and made available to {{licensee}} under this Agreement. "Licensed Software"
      means the specific version and configuration of {{software_name}} identified in the License Schedule or Order Form, together
      with all updates, patches and maintenance releases provided by {{licensor}} during the term of this Agreement. "Named User"
      means an individual person who is authorized by {{licensee}} to access and use the Licensed Software, identified by a unique
      user credential; the total number of Named Users shall not exceed {{users}} at any time unless additional user licenses
      are purchased. "Licensed Site" means the physical location or data center operated by or on behalf of {{licensee}} at which
      the Licensed Software is installed and operated, limited to {{locations}} designated site(s) as specified in the License
      Schedule. "License Fee" means the one-time or recurring fee of {{license_fee}} payable by {{licensee}} to {{licensor}}
      for the rights granted under this Agreement, as further specified in the Payment section hereof. "Maintenance Fee" means
      the annual fee of {{maintenance_fee}} payable by {{licensee}} to {{licensor}} in consideration of {{licensor}}''s obligation
      to provide maintenance and support services for the Licensed Software. "Effective Date" means the date on which this
      Agreement is executed by both parties or, if executed on different dates, the date on which the last party executes this
      Agreement.

      '
  SERVICES:
  - id: SVC_SUPPORT_TIERS
    contract_type: software_license
    jurisdiction: default
    quality_score: 5
    source: Enterprise SLA frameworks — ITIL-aligned
    template: 'Licensor shall provide maintenance and technical support for {{software_name}} during {{support_coverage}}
      in accordance with the following severity classifications: Severity 1 (Critical) — a production system is down or a
      core business function is completely unavailable, with no workaround; initial response within {{sla_hours}} hour(s),
      continuous effort until resolution or workaround is provided. Severity 2 (High) — significant functionality is impaired
      but a workaround exists; initial response within four (4) business hours, target resolution within one (1) business
      day. Severity 3 (Medium) — non-critical functionality is impaired with minimal business impact; initial response within
      one (1) business day, target resolution within five (5) business days. Licensee shall designate a primary technical
      contact for all support requests and shall provide Licensor with reasonable access to systems and information necessary
      to diagnose and resolve reported issues.

      '
    industry_additions:
      financial_services: For issues affecting trade execution, settlement processing, or regulatory reporting functions,
        Licensor shall treat all such issues as no less than Severity 2 regardless of the number of affected users, and shall
        maintain a dedicated escalation path for financial-critical incidents.
      healthcare: For issues affecting electronic health record availability, clinical decision support, or patient safety
        functions, Licensor shall escalate to Severity 1 regardless of workaround availability, and shall notify Licensee's
        designated compliance officer within one (1) hour of classification.
  - id: SVC_SERVICE_CREDITS
    contract_type: software_license
    jurisdiction: default
    quality_score: 4
    source: Cloud/SaaS service credit frameworks
    template: '{{#if support.uptimeSla}}In the event that Licensor fails to meet the guaranteed uptime of {{support.uptimeSla}}%
      measured on a calendar-month basis (excluding scheduled maintenance windows for which Licensor has provided at least
      seventy-two (72) hours'' advance notice), Licensee shall be entitled to service credits as follows: for each full one
      percent (1%) of downtime below the guaranteed threshold, Licensee shall receive a credit equal to five percent (5%)
      of the monthly portion of the Maintenance Fee, up to a maximum credit of thirty percent (30%) of the applicable monthly
      fee. Service credits are Licensee''s sole and exclusive remedy for failure to meet the uptime guarantee. Licensee must
      request applicable credits in writing within thirty (30) days of the end of the affected calendar month.{{/if}}

      '
  - id: SVC_PATCH_MAINTENANCE
    contract_type: software_license
    jurisdiction: default
    quality_score: 4
    source: Standard software maintenance schedules
    template: 'Licensor shall provide software updates and patches on a {{patch_frequency}} basis, which shall include security
      patches, bug fixes, and minor enhancements. Critical security patches addressing vulnerabilities with a CVSS score of
      7.0 or above shall be made available within seventy-two (72) hours of Licensor''s confirmed identification of the vulnerability.
      All patches shall be accompanied by release notes describing the changes, known issues, and any required configuration
      modifications. Licensee shall be responsible for applying patches to its environment within thirty (30) days of availability;
      failure to apply critical security patches within such period may relieve Licensor of liability for security incidents
      attributable to the unpatched vulnerability.

      '
  - id: SVC_SAAS_SUBSCRIPTION
    contract_type: saas
    jurisdiction: default
    quality_score: 4
    source: Standard SaaS subscription agreement
    template: 'Subject to the terms of this Agreement and payment of all applicable Subscription Fees, Provider hereby grants
      to Customer a non-exclusive, non-transferable right to access and use the Service during the Subscription Term solely
      for Customer''s internal business purposes, for up to {{users}} authorized users. Customer shall not permit access to
      the Service by any person other than authorized users, and shall be responsible for all activities conducted under its
      user accounts. The Service is provided on a multi-tenant basis, and Provider reserves the right to modify the Service
      from time to time, provided that no such modification shall materially diminish the core functionality of the Service
      during the then-current Subscription Term.

      '
  - id: SVC_MSA_SCOPE_AND_SOW
    contract_type: msa
    jurisdiction: default
    quality_score: 5
    source: Curated from enterprise MSA frameworks (Federated Services Agreement, Reynolds Transition Services patterns)
    template: '{{service_provider}} shall provide to {{client}} the Services described in each Statement of Work executed
      by the parties in accordance with the terms and conditions of this Agreement. Each SOW shall reference this Agreement
      and shall specify: (a) a description of the Services to be performed; (b) the Deliverables to be provided; (c) the timeline
      for performance and delivery; (d) the fees and payment terms; (e) any acceptance criteria for Deliverables; and (f)
      any additional terms specific to the engagement. In the event of any conflict between the terms of this Agreement and
      a SOW, the terms of this Agreement shall prevail unless the SOW expressly states that a specific provision supersedes
      a specified section of this Agreement. {{service_provider}} shall perform all Services in a professional and workmanlike
      manner consistent with generally accepted industry standards and practices, using personnel with the requisite skill,
      experience and qualifications. {{service_provider}} shall devote adequate resources to meet its obligations under each
      SOW and shall not materially reduce the quality or level of Services without {{client}}''s prior written consent.

      '
    industry_additions:
      financial_services: All Services involving access to or processing of financial data, customer accounts, or regulated
        transactions shall be performed in compliance with all applicable financial regulatory requirements, including but
        not limited to SOC 2 Type II controls, and {{service_provider}} shall provide evidence of such compliance upon {{client}}'s
        reasonable request.
      healthcare: All Services involving access to Protected Health Information shall be performed in compliance with the
        Health Insurance Portability and Accountability Act and the parties shall execute a Business Associate Agreement prior
        to the commencement of such Services.
  - id: SVC_MSA_SERVICE_LEVELS
    contract_type: msa
    jurisdiction: default
    quality_score: 4
    source: Enterprise MSA service level and performance standard provisions
    template: '{{service_provider}} shall perform the Services at a level of quality substantially similar in all material
      respects to the service levels set forth in the applicable SOW and, where no specific service levels are stated, in
      accordance with commercially reasonable industry standards for services of a similar nature and scope. In the event
      of any material failure by {{service_provider}} to perform the Services in accordance with the applicable service levels,
      {{client}} shall provide {{service_provider}} with written notice specifying the nature of such failure in reasonable
      detail, and {{service_provider}} shall use commercially reasonable efforts to remedy such failure as soon as reasonably
      practicable. If {{service_provider}} fails to remedy such material failure within thirty (30) days of receipt of written
      notice (or such longer period as may be reasonably required provided {{service_provider}} commences cure within such
      period and diligently pursues the same), {{client}} may, without limiting any other remedies available, terminate the
      applicable SOW upon written notice.

      '
  - id: SVC_SAAS_UPTIME_SLA
    contract_type: saas
    jurisdiction: default
    quality_score: 5
    source: Curated from enterprise SaaS SLA frameworks (AssetMark Performance Standards pattern)
    template: '{{provider}} shall use commercially reasonable efforts to make the Service available with a Monthly Uptime
      Percentage of at least {{uptime_sla}}% during each calendar month, measured as ((total minutes in calendar month minus
      unplanned downtime minutes) / total minutes in calendar month) x 100. "Unplanned Downtime" means any period during which
      the Service is materially unavailable to {{customer}} due to circumstances within {{provider}}''s reasonable control,
      excluding: (a) scheduled maintenance windows for which {{provider}} has provided at least seventy-two (72) hours'' advance
      notice; (b) downtime caused by factors outside {{provider}}''s reasonable control, including force majeure events, Internet
      access failures or related problems beyond the demarcation point of {{provider}}''s network; (c) downtime resulting
      from any actions or inactions of {{customer}} or any Authorized User; and (d) downtime attributable to {{customer}}''s
      equipment, software or other technology. In the event that {{provider}} fails to meet the Monthly Uptime Percentage
      in any calendar month, {{customer}} shall be entitled to a service credit equal to five percent (5%) of the applicable
      monthly Subscription Fee for each full one percent (1%) below the guaranteed threshold, up to a maximum credit of thirty
      percent (30%) of the applicable monthly fee. Service credits shall be {{customer}}''s sole and exclusive remedy for
      failure to meet the uptime commitment.

      '
    industry_additions:
      financial_services: For any downtime affecting trade execution, settlement processing or regulatory reporting functionality,
        {{provider}} shall treat such incidents as critical priority regardless of the number of affected users, and shall
        maintain a dedicated escalation path with a target response time of fifteen (15) minutes during market hours.
      healthcare: For any downtime affecting electronic health record access, clinical decision support or patient safety
        functionality, {{provider}} shall escalate to critical priority regardless of workaround availability, notify {{customer}}'s
        designated compliance officer within one (1) hour, and provide {{customer}} with a detailed incident report within
        twenty-four (24) hours of resolution.
  - id: SVC_EMPLOYMENT_DUTIES
    contract_type: employment
    jurisdiction: default
    quality_score: 5
    source: Standard employment duties and performance provisions
    template: '{{employer}} hereby employs {{employee}}, and {{employee}} hereby accepts employment with {{employer}}, in
      the position and with the duties and responsibilities as set forth in the offer letter or as may be assigned from time
      to time by {{employer}}. {{employee}} shall devote substantially all of {{employee}}''s working time, attention, skill
      and energy to the faithful performance of {{employee}}''s duties under this Agreement. {{employee}} shall comply with
      all policies, procedures and standards of conduct established by {{employer}} from time to time and communicated to
      {{employee}}. During the term of this Agreement, {{employee}} shall not, without the prior written consent of {{employer}},
      engage in any other employment, consulting or business activity that would conflict with {{employee}}''s obligations
      hereunder, compete with the business of {{employer}}, or interfere with {{employee}}''s ability to perform {{employee}}''s
      duties under this Agreement. {{employee}} shall promptly disclose to {{employer}} any situation that may give rise to
      an actual or potential conflict of interest.

      '
  - id: SVC_SUPPLY_OBLIGATIONS
    contract_type: supply
    jurisdiction: default
    quality_score: 5
    source: Curated from enterprise supply agreement manufacturing and delivery provisions (Pfizer/Upjohn, InMode/Flextronics
      patterns)
    template: '{{supplier}} shall manufacture and supply the Products to {{buyer}} in accordance with the Specifications and
      the terms and conditions of this Agreement and each accepted Purchase Order. {{supplier}} shall maintain sufficient
      manufacturing capacity, qualified personnel and inventory of raw materials to fulfill {{buyer}}''s Purchase Orders in
      accordance with the delivery schedules set forth therein. {{buyer}} shall provide {{supplier}} with a rolling Forecast
      on a monthly basis. The first three (3) months of each Forecast shall constitute a binding commitment, and {{supplier}}
      shall maintain sufficient raw materials and capacity to fulfill binding Forecast quantities. {{supplier}} shall deliver
      Products in accordance with the delivery terms specified in the applicable Purchase Order. Risk of loss and title to
      the Products shall pass to {{buyer}} upon delivery to the carrier at {{supplier}}''s designated shipping point, unless
      otherwise specified in the Purchase Order. {{supplier}} shall include with each shipment all required documentation,
      including certificates of analysis, certificates of conformance and bills of lading.

      '
    industry_additions:
      healthcare: All Products shall be manufactured, packaged, labeled, stored and shipped in compliance with current Good
        Manufacturing Practices as defined by the applicable regulatory authority, including the U.S. Food and Drug Administration
        and the European Medicines Agency, and {{supplier}} shall maintain all required manufacturing licenses and permits
        throughout the term of this Agreement.
  - id: SVC_IP_LICENSE_GRANT
    contract_type: ip_license
    jurisdiction: default
    quality_score: 5
    source: Curated from enterprise IP license grant provisions
    template: 'Subject to the terms and conditions of this Agreement and {{licensee}}''s payment of all applicable License
      Fees, {{licensor}} hereby grants to {{licensee}} a {{license_type}}, non-sublicensable (except as expressly permitted
      herein) license to use, practice, reproduce, display, perform, distribute and create derivative works of the Licensed
      IP solely within the Licensed Territory, solely within the Licensed Field and solely for the purposes set forth in the
      License Schedule. {{licensee}} shall not: (a) use the Licensed IP outside the Licensed Territory or Licensed Field;
      (b) sublicense, assign or transfer any of the rights granted hereunder without {{licensor}}''s prior written consent;
      (c) use the Licensed IP in any manner that is defamatory, obscene, or otherwise objectionable or that could reasonably
      be expected to diminish the value of the Licensed IP; or (d) file any application for registration of any intellectual
      property right in the Licensed IP or any confusingly similar mark, work or invention. {{licensor}} reserves all rights
      in and to the Licensed IP not expressly granted to {{licensee}} under this Agreement.

      '
  PAYMENT:
  - id: PAY_LICENSE_FEE_STRUCTURE
    contract_type: software_license
    jurisdiction: default
    quality_score: 5
    source: Standard enterprise license fee and payment terms
    template: 'In consideration of the license granted herein, Licensee shall pay to Licensor a one-time license fee of {{license_fee}}
      (the "License Fee"), payable within thirty (30) days of the Effective Date. All fees are quoted exclusive of applicable
      taxes, and Licensee shall be responsible for all sales, use, value-added, withholding, and similar taxes arising from
      this Agreement, excluding taxes based on Licensor''s net income. Licensor reserves the right to suspend Licensee''s
      access to support services in the event of any undisputed payment that remains outstanding for more than fifteen (15)
      days beyond its due date.

      '
  - id: PAY_MAINTENANCE_FEE
    contract_type: software_license
    jurisdiction: default
    quality_score: 5
    source: Industry-standard annual maintenance provisions
    template: 'Commencing on the first anniversary of the Effective Date, Licensee shall pay an annual maintenance and support
      fee of {{maintenance_fee}} (the "Maintenance Fee"), payable in advance on each anniversary date. The Maintenance Fee
      entitles Licensee to receive all updates, patches, bug fixes, and standard telephone and email support in accordance
      with the support terms specified herein. Licensor may increase the Maintenance Fee upon each renewal period by providing
      not less than sixty (60) days'' prior written notice, provided that any such increase shall not exceed five percent
      (5%) of the prior year''s Maintenance Fee. If Licensee elects not to renew maintenance, Licensee may continue to use
      the Software under the existing license but shall not be entitled to any updates, patches, or support services, and
      reinstatement of lapsed maintenance shall require payment of all fees that would have been due during the lapse period.

      '
  - id: PAY_LATE_PAYMENT
    contract_type: software_license
    jurisdiction: default
    quality_score: 4
    source: Standard commercial late payment provisions
    template: 'Any amount not paid when due shall accrue interest at the lesser of one and one-half percent (1.5%) per month
      or the maximum rate permitted by applicable law, calculated from the date such payment was due until the date of actual
      payment. In addition, Licensee shall reimburse Licensor for all reasonable costs of collection, including attorneys''
      fees, incurred as a result of Licensee''s failure to make timely payment. Licensor''s acceptance of late payment shall
      not constitute a waiver of any rights under this Agreement.

      '
  - id: PAY_SAAS_SUBSCRIPTION
    contract_type: saas
    jurisdiction: default
    quality_score: 4
    source: SaaS billing and auto-renewal provisions
    template: 'Customer shall pay the Subscription Fee of {{license_fee}} per {{fees.billingCycle}} cycle in advance. Unless
      Customer provides written notice of non-renewal at least thirty (30) days prior to the end of the then-current Subscription
      Term, the Subscription Term shall automatically renew for successive periods of equal duration at Provider''s then-current
      list price. Provider may modify pricing for any renewal term by providing Customer not less than sixty (60) days'' written
      notice prior to the commencement of such renewal term. All fees are non-refundable except as expressly set forth in
      this Agreement.

      '
  - id: PAY_MSA_FEES_AND_EXPENSES
    contract_type: msa
    jurisdiction: default
    quality_score: 5
    source: Standard enterprise MSA fee structure provisions
    template: '{{client}} shall pay {{service_provider}} the fees set forth in each SOW in accordance with the payment terms
      specified therein. Unless otherwise stated in a SOW, {{service_provider}} shall invoice {{client}} monthly in arrears
      for Services performed during the preceding calendar month, and {{client}} shall pay each undisputed invoice within
      thirty (30) days of receipt. All fees are exclusive of applicable taxes, and {{client}} shall be responsible for all
      sales, use, value-added, withholding, and similar taxes arising from the Services, excluding taxes based on {{service_provider}}''s
      net income. {{service_provider}} shall be entitled to reimbursement of reasonable, pre-approved out-of-pocket expenses
      incurred in the performance of the Services, provided that any individual expense exceeding five hundred dollars ($500)
      shall require {{client}}''s prior written approval. {{service_provider}} shall submit expense reports with supporting
      documentation within thirty (30) days of incurring such expenses.

      '
  - id: PAY_EMPLOYMENT_COMPENSATION
    contract_type: employment
    jurisdiction: default
    quality_score: 5
    source: Standard employment compensation and benefits provisions
    template: 'In consideration of {{employee}}''s services hereunder, {{employer}} shall pay {{employee}} a base salary of
      {{salary}} per annum, payable in accordance with {{employer}}''s standard payroll practices, less all required withholdings
      and authorized deductions. {{employee}} shall be eligible to participate in {{employer}}''s employee benefit programs,
      including health insurance, retirement plans and paid time off, in accordance with the terms and conditions of such
      programs as may be in effect from time to time. {{employer}} reserves the right to modify, amend or terminate any benefit
      program at any time in its sole discretion, subject to applicable law. {{employer}} shall review {{employee}}''s base
      salary annually, and any adjustment shall be at {{employer}}''s sole discretion. All compensation paid to {{employee}}
      under this Agreement shall be subject to applicable federal, state and local tax withholding and reporting requirements.

      '
  - id: PAY_SUPPLY_PRICING
    contract_type: supply
    jurisdiction: default
    quality_score: 5
    source: Curated from supply agreement pricing and payment provisions (Reynolds/Pactiv, Pfizer/Upjohn patterns)
