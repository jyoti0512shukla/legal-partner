# Clause-type registry — single source of truth for everything that varies
# per clause type. Add a new clause? One entry here. Don't edit Java.
#
# Fields per clause:
#   title                — display-name shown in article headings
#   expected_subclauses  — QA target count (0 = no structural constraint)
#   system_prompt_id     — name of the Java constant in PromptTemplates
#                          (e.g. DRAFT_LIABILITY_SYSTEM). Phase 2 will move
#                          the bodies into resources/prompts/ files.
#   user_prompt_id       — same, for the user template
#   search_queries       — 2-4 query variants for multi-query RAG retrieval
#   acceptable_clause_types — metadata filter for precedent chunks
#   semantic_requirements  — keywords the final output MUST contain (lowercased)
#   forbidden_headings     — phrases that, if present, indicate content from
#                          a DIFFERENT clause type was pasted in (triggers retry)
#
# Note: DEFAULTS ONLY. Runtime still allows overrides via individual service
# logic where needed (e.g. localeConfig for jurisdiction).

clauses:

  DEFINITIONS:
    title: "Definitions"
    expected_subclauses: 7
    system_prompt_id: DRAFT_DEFINITIONS_SYSTEM
    user_prompt_id: DRAFT_DEFINITIONS_USER
    search_queries:
      - "definitions interpretation meaning terms agreement"
      - "confidential information disclosing receiving party purpose"
      - "affiliate subsidiary intellectual property business day"
      - "defined terms contract definitions schedule annexure"
    acceptable_clause_types: [DEFINITIONS, GENERAL]
    semantic_requirements: []
    forbidden_headings: []

