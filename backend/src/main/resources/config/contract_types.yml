  supply:
    document_type: SUPPLY
    display_name: "Supply Agreement"
    contract_mode: SUPPLY
    party_roles: ["Supplier", "Buyer"]
    banned_terms: ["subscription", "authorized users", "SaaS", "license grant"]
    default_sections:
      - DEFINITIONS
      - SERVICES
      - PAYMENT
      - FORCE_MAJEURE
      - LIABILITY
      - TERMINATION
      - GOVERNING_LAW
      - GENERAL_PROVISIONS

  software_license:
    document_type: IP_LICENSE
    display_name: "Software License Agreement"
    contract_mode: SOFTWARE_LICENSE
    party_roles: ["Licensor", "Licensee"]
    banned_terms: ["Statement of Work", "Deliverables", "subscription fee", "SaaS"]
    default_sections:
      - DEFINITIONS
      - IP_RIGHTS
      - SERVICES
      - PAYMENT
      - CONFIDENTIALITY
