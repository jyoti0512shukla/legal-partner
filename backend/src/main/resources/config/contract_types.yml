# Contract-type registry — single source of truth for each template the app
# supports. Drives:
#   - Frontend template selector (display_name)
#   - RAG retrieval scoping (document_type used to match uploaded precedents)
#   - Section planner fallback (default_sections when the LLM planner fails
#     or returns fewer sections than the floor)
#
# Adding a new contract template: one YAML block. No Java changes.
#
# Fields:
#   document_type    — value used to tag uploaded precedents of this kind;
#                      must match a DocumentType enum value (NDA, MSA, SAAS,
#                      EMPLOYMENT, etc.). Determines which precedents are
#                      retrievable when drafting this template.
#   display_name     — shown in UI
#   default_sections — ordered list of clause-type keys the section planner
#                      falls back to if the LLM fails. Must beat the planner's
#                      count for the "floor" logic in DraftService.planSections
#                      to kick in and prevent undercounting.

contract_types:

  nda:
    document_type: NDA
    display_name: "Non-Disclosure Agreement"
    default_sections:
      - DEFINITIONS
      - CONFIDENTIALITY
      - LIABILITY
      - TERMINATION
      - GOVERNING_LAW
      - GENERAL_PROVISIONS

  msa:
