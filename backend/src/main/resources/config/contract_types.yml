    display_name: "SaaS Subscription Agreement"
    contract_mode: SAAS
    party_roles: ["Provider", "Customer"]
    banned_terms: ["Statement of Work", "Deliverables", "milestone", "perpetual license"]
    default_sections:
      - DEFINITIONS
      - SERVICES
      - PAYMENT
      - CONFIDENTIALITY
      - DATA_PROTECTION
      - LIABILITY
      - TERMINATION
      - GOVERNING_LAW
      - GENERAL_PROVISIONS

  fintech_msa:
